<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Булат и Алия</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
:root{--g:#233a2d;--bg:#fff;--b:#e7e7e7}
body{margin:0;background:#fff;color:#233a2d;font-family:Inter,sans-serif}
section{max-width:980px;margin:auto;padding:70px 20px}
.hero{min-height:100vh;display:grid;place-items:center;text-align:center}
h1,h2{font-family:"Cormorant Garamond",serif}
h1{font-size:68px;margin:0}
.card{border:1px solid var(--g);border-radius:20px;padding:25px;margin:20px 0;box-shadow:0 10px 30px rgba(0,0,0,.05);opacity:0;transform:translateY(30px);transition:.8s}
.card.show{opacity:1;transform:none}
#timer{display:flex;gap:15px;justify-content:center;flex-wrap:wrap}
.box{border:1px solid var(--g);padding:15px 20px;border-radius:16px;min-width:80px}
#map{height:420px;border-radius:18px;overflow:hidden}
.btn{display:inline-block;background:var(--g);color:#fff;text-decoration:none;padding:14px 26px;border-radius:30px}
.qr{display:flex;justify-content:center;margin:25px}
@media(max-width:700px){h1{font-size:48px}}
</style>
</head>
<body>
<section class="hero">
<div>
<h1>Булат и Алия</h1>
<p>Приглашаем разделить с нами самый счастливый день.</p>
<div id="timer"></div>
</div>
</section>

<section>
<div class="card">
<h2>Программа дня</h2>
<p><b>13:00</b> — Никах в мечети Ахмадзаки</p>
<p><b>15:30</b> — Сбор в банкетном зале (Кафе «Урман»)</p>
</div>

<div class="card">
<h2>Локации</h2>
<div id="map"></div>
</div>

<div class="card">
<h2>Подтверждение присутствия</h2>
<div class="qr"><img id="qr" alt="QR"></div>
<p style="text-align:center"><a class="btn" id="btn" target="_blank">Подтвердить присутствие</a></p>
<p style="text-align:center">Замените ссылку FORM_URL в коде на вашу Google Форму.</p>
</div>
</section>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const FORM_URL="https://example.com";
document.getElementById("btn").href=FORM_URL;
document.getElementById("qr").src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data="+encodeURIComponent(FORM_URL);

const wedding=new Date("2026-08-30T13:00:00");
function tick(){
let d=wedding-new Date();
let s=Math.max(0,Math.floor(d/1000));
let days=Math.floor(s/86400);s%=86400;
let h=Math.floor(s/3600);s%=3600;
let m=Math.floor(s/60);let sec=s%60;
timer.innerHTML=[["Дней",days],["Часов",h],["Мин",m],["Сек",sec]].map(x=>`<div class=box><div style="font-size:32px">${x[1]}</div>${x[0]}</div>`).join("");
}
setInterval(tick,1000);tick();

document.querySelectorAll(".card").forEach(c=>new IntersectionObserver(e=>e.forEach(i=>i.isIntersecting&&i.target.classList.add("show"))).observe(c));

const map=L.map('map').setView([55.773,49.188],12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map);
const p1=[55.7619,49.1785],p2=[55.7709,49.1889];
L.marker(p1).addTo(map).bindPopup("Мечеть Ахмадзаки");
L.marker(p2).addTo(map).bindPopup("Кафе Урман");
L.polyline([p1,p2],{color:"#233a2d"}).addTo(map);
map.fitBounds([p1,p2],{padding:[40,40]});
</script>
</body>
</html>
